services:
  db:
    image: postgres:17.7
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=superpassword
    volumes:
      - ./containers/db/postgresql.conf:/etc/postgresql/postgresql.conf

  pgadmin:
    image: dpage/pgadmin4
    user: root
    ports:
      - 5050:80
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@example.com
      - PGADMIN_DEFAULT_PASSWORD=superpassword
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
      - PGADMIN_CONFIG_CONSOLE_LOG_LEVEL=0
    volumes:
      - ./containers/pgadmin/pgpass:/pgpass
      - ./containers/pgadmin/servers.json:/pgadmin4/servers.json
